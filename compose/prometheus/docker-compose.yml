services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    user: 1000:1000
    environment:
      TZ: Australia/Melbourne
    ports:
      - '9090:9090'
    networks:
      - proxy
      - prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - /persist/prometheus:/prometheus

networks:
  proxy:
    external: true
  prometheus:
    external: true
