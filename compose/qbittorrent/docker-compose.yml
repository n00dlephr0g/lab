services:
  qbittorrent-nox:
    image: qbittorrentofficial/qbittorrent-nox:latest
    # additional arguments to `qbittorrent-nox`
    #command:
      #- --help
    container_name: qbittorrent
    user: 1000:1000
    environment:
      QBT_LEGAL_NOTICE: confirm
      QBT_WEBUI_PORT: 8080
      TZ: Australia/Melbourne
      #- UMASK=022
    ports:
      # for bittorrent traffic
      - 6881:6881/tcp
      - 6881:6881/udp
      # for WebUI
      - 8089:8080/tcp
    networks:
      - proxy
    read_only: true
    stop_grace_period: 30m
    tmpfs:
      - /tmp
    tty: true
    # for debugging
    cap_add:
      - SYS_PTRACE
    volumes:
      - /persist/transmission:/config
      - /data/downloads:/downloads

networks:
  proxy:
    external: true
